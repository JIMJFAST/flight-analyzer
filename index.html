function buildChartVerdict(data, phases) {
  const findings = [];
  let overallStatus = 'good'; // good, warn, bad

  const bat = data.BAT || [];
  const vibe = data.VIBE || [];
  const att = data.ATT || [];
  const gps = data.GPS || [];
  const rcou = data.RCOU || [];
  const esc = data.ESC || [];
  const ctun = data.CTUN || [];
  const baro = data.BARO || [];

  // Battery
  if (bat.length > 10) {
    const volts = bat.map(b => b.Volt).filter(v => v > 0);
    const maxV = Math.max(...volts), minV = Math.min(...volts);
    const sagPct = maxV > 0 ? ((maxV - minV) / maxV * 100) : 0;
    if (sagPct > 20) { findings.push({ status: 'bad', text: `Battery voltage sag is ${sagPct.toFixed(0)}% — excessive drop under load. Battery may be worn or undersized.` }); overallStatus = 'bad'; }
    else if (sagPct > 12) { findings.push({ status: 'warn', text: `Battery voltage sag is ${sagPct.toFixed(0)}% — moderate. Battery is working hard under load.` }); if (overallStatus === 'good') overallStatus = 'warn'; }
    else { findings.push({ status: 'good', text: `Battery voltage curve is healthy — ${sagPct.toFixed(0)}% sag, steady decline.` }); }
  }

  // Vibration
  if (vibe.length > 10) {
    const avgMag = vibe.reduce((s,v) => s + Math.sqrt(v.VibeX**2 + v.VibeY**2 + v.VibeZ**2), 0) / vibe.length;
    const clips = vibe.reduce((s,v) => s + (v.Clip || 0), 0);
    if (clips > 0) { findings.push({ status: 'bad', text: `Vibration chart shows ${clips.toLocaleString()} clipping events — accelerometer saturated. Props need balancing or replacement.` }); overallStatus = 'bad'; }
    else if (avgMag > 30) { findings.push({ status: 'warn', text: `Vibration levels are elevated (avg ${avgMag.toFixed(0)} m/s²). Check prop balance and motor mounts.` }); if (overallStatus === 'good') overallStatus = 'warn'; }
    else { findings.push({ status: 'good', text: `Vibration levels are low and stable — props and frame are in good condition.` }); }
  }

  // Attitude tracking
  if (att.length > 50) {
    const rollErrs = att.map(a => Math.abs((a.DesRoll||0) - (a.Roll||0)));
    const pitchErrs = att.map(a => Math.abs((a.DesPitch||0) - (a.Pitch||0)));
    const maxRoll = Math.max(...rollErrs), maxPitch = Math.max(...pitchErrs);
    const avgRoll = rollErrs.reduce((a,b)=>a+b,0) / rollErrs.length;
    if (maxRoll > 15 || maxPitch > 15) { findings.push({ status: 'bad', text: `Desired vs Actual shows large errors (max ${Math.max(maxRoll,maxPitch).toFixed(0)}°) — aircraft struggled to follow commands. Check PIDs, mechanical issues, or heavy wind.` }); overallStatus = 'bad'; }
    else if (maxRoll > 8 || maxPitch > 8) { findings.push({ status: 'warn', text: `Desired vs Actual shows moderate tracking errors (max ${Math.max(maxRoll,maxPitch).toFixed(0)}°) — likely wind gusts or maneuver transitions.` }); if (overallStatus === 'good') overallStatus = 'warn'; }
    else { findings.push({ status: 'good', text: `Desired vs Actual tracking is tight (avg ${avgRoll.toFixed(1)}° error) — PIDs are well tuned.` }); }
  }

  // Motor outputs — only check during actual flight (avg PWM > 1200 = motors spinning meaningfully)
  const hadMotorFlight = rcou.length > 10 && rcou.filter(r => r.C1 > 1200).length > rcou.length * 0.3;
  if (hadMotorFlight) {
    const mid = rcou[Math.floor(rcou.length/2)];
    const chans = [];
    for (let i = 1; i <= 8; i++) { if (mid[`C${i}`] > 1100) chans.push(`C${i}`); }
    if (chans.length >= 2) {
      const avgs = chans.map(ch => {
        const vals = rcou.filter(r => r[ch] > 1100).map(r => r[ch]);
        return vals.length > 0 ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
      });
      const overall = avgs.reduce((a,b)=>a+b,0) / avgs.length;
      const spread = overall > 0 ? (Math.max(...avgs) - Math.min(...avgs)) / overall * 100 : 0;
      if (spread > 10) { findings.push({ status: 'bad', text: `Motor output chart shows ${spread.toFixed(0)}% PWM imbalance — one motor is working significantly harder. Indicates CG offset, damaged prop, or motor issue.` }); overallStatus = 'bad'; }
      else if (spread > 5) { findings.push({ status: 'warn', text: `Motor output chart shows ${spread.toFixed(0)}% PWM imbalance — minor CG offset or prop wear.` }); if (overallStatus === 'good') overallStatus = 'warn'; }
      else { findings.push({ status: 'good', text: `Motor outputs are well balanced — all motors share the load evenly.` }); }
    }
  }

  // GPS path
  if (gps.length > 10) {
    let maxJump = 0;
    for (let i = 1; i < gps.length; i++) {
      const d = Math.sqrt(((gps[i].Lat-gps[i-1].Lat)*111139)**2 + ((gps[i].Lng-gps[i-1].Lng)*111139*Math.cos(gps[i].Lat*Math.PI/180))**2);
      const dt = (gps[i].TimeUS - gps[i-1].TimeUS) / 1e6;
      if (dt > 0 && dt < 2) maxJump = Math.max(maxJump, d/dt);
    }
    if (maxJump > 30) { findings.push({ status: 'warn', text: `Flight path shows GPS position jumps (max ${maxJump.toFixed(0)} m/s between samples) — possible GPS interference.` }); if (overallStatus === 'good') overallStatus = 'warn'; }
    else { findings.push({ status: 'good', text: `Flight path is clean — GPS track is smooth with no position jumps.` }); }
  }

  // Altitude
  const isCopter = ctun.length > 0 && ('CRt' in (ctun[0]||{}));
  const altSource = isCopter ? ctun : (baro.length > 0 ? baro : []);
  if (altSource.length > 10) {
    const alts = altSource.map(a => a.Alt || 0);
    const maxAlt = Math.max(...alts);
    if (maxAlt > 0) findings.push({ status: 'good', text: `Altitude chart shows max ${maxAlt.toFixed(0)}m with controlled climb and descent.` });
  }

  return { overallStatus, findings };
}

function calcEnvironment(data, params) {
  const baro = data.BARO || [];
  const gps = data.GPS || [];
  const imu = data.IMU || [];
  const heat = data.HEAT || [];
  params = params || {};

  const env = {};

  // Barometric data
  if (baro.length > 0) {
    const baro0 = baro.filter(b => (b.I === 0 || b.I === undefined));
    const src = baro0.length > 0 ? baro0 : baro;
    const temps = src.map(b => b.Temp).filter(v => v > -50);
    const press = src.map(b => b.Press).filter(v => v > 0);
    const alts = src.map(b => b.Alt);

    env.baroTempMin = Math.min(...temps);
    env.baroTempMax = Math.max(...temps);
    env.baroTempAvg = temps.reduce((a,b)=>a+b,0) / temps.length;
    env.baroPressMin = Math.min(...press);
    env.baroPressMax = Math.max(...press);
    env.baroPressAvg = press.reduce((a,b)=>a+b,0) / press.length;
    env.baroAltMin = Math.min(...alts);
    env.baroAltMax = Math.max(...alts);
    env.gndTemp = src[0].GndTemp || null;

    // Ground pressure from params (more accurate)
    env.gndPress = params['BARO1_GND_PRESS'] || env.baroPressMax;
  }

  // GPS altitude (AMSL)
  if (gps.length > 0) {
    const gpsAlts = gps.map(g => g.Alt).filter(v => v > 0);
    if (gpsAlts.length > 0) {
      env.gpsAltStart = gpsAlts[0];
      env.gpsAltMax = Math.max(...gpsAlts);
      env.gpsAltMin = Math.min(...gpsAlts);
      env.fieldElevM = gpsAlts[0];
      env.fieldElevFt = gpsAlts[0] * 3.28084;
    }
  }

  // IMU temperature
  if (imu.length > 0) {
    const imu0 = imu.filter(i => (i.I === 0 || i.I === undefined));
    const src = imu0.length > 0 ? imu0 : imu;
    const imuTemps = src.map(i => i.T).filter(v => v > -50 && v < 100);
    if (imuTemps.length > 0) {
      env.imuTempMin = Math.min(...imuTemps);
      env.imuTempMax = Math.max(...imuTemps);
      env.imuTempAvg = imuTemps.reduce((a,b)=>a+b,0) / imuTemps.length;
    }
  }

  // Heater (CubeOrange has IMU heater)
  if (heat.length > 0) {
    env.heaterTarget = heat[0].Targ;
    env.heaterTempMin = Math.min(...heat.map(h => h.Temp));
    env.heaterTempMax = Math.max(...heat.map(h => h.Temp));
    env.heaterAvgOutput = heat.reduce((s,h) => s + (h.Out||0), 0) / heat.length;
  }

  // Calculate density altitude
  if (env.baroPressAvg && env.baroTempAvg !== undefined && env.fieldElevFt) {
    const pressHpa = env.baroPressAvg / 100;
    const qnhInHg = pressHpa * 0.02953;
    env.pressureAltFt = env.fieldElevFt + ((29.92 - qnhInHg) * 1000);
    env.isaTemp = 15 - (env.pressureAltFt * 0.00198);
    env.isaDev = env.baroTempAvg - env.isaTemp;
    env.densityAltFt = env.pressureAltFt + (env.isaDev * 120);
    env.densityAltM = env.densityAltFt * 0.3048;

    // DA performance factor (same as your battery calculator)
    env.daFactor = Math.max(0.5, 1 - (env.densityAltFt / 1000) * 0.03);
    env.daPerfPct = env.daFactor * 100;

    // Air density
    const tempK = env.baroTempAvg + 273.15;
    env.airDensity = (pressHpa * 100) / (287.05 * tempK);
    env.airDensityPct = (env.airDensity / 1.225) * 100; // % of sea level standard
  }

  // Field elevation from params
  if (params['BARO_FIELD_ELV'] && params['BARO_FIELD_ELV'] > 0) {
    env.configFieldElev = params['BARO_FIELD_ELV'];
  }

  return env;
}

function renderEnvironment(env) {
  const el = document.getElementById('tab-environment');
  let html = '';

  // Density Altitude card (most important)
  if (env.densityAltFt !== undefined) {
    let daStatus = 'good', daBadge = 'badge-good', daLabel = 'NORMAL';
    if (env.densityAltFt > 5000) { daStatus = 'bad'; daBadge = 'badge-bad'; daLabel = 'HIGH DA — REDUCED PERFORMANCE'; }
    else if (env.densityAltFt > 3000) { daStatus = 'warn'; daBadge = 'badge-warn'; daLabel = 'ELEVATED DA'; }
    else { daLabel = 'LOW DA — GOOD PERFORMANCE'; }

    html += `<div class="card" style="border-color:${daStatus === 'good' ? 'var(--green)' : daStatus === 'warn' ? 'var(--yellow)' : 'var(--red)'}">
      <h3><span class="badge ${daBadge}">${daLabel}</span> Density Altitude</h3>
      <div class="data-grid">
        ${dataItem('Density Altitude', env.densityAltFt.toFixed(0), 'ft')}
        ${dataItem('Density Altitude', env.densityAltM.toFixed(0), 'm')}
        ${dataItem('Pressure Altitude', env.pressureAltFt.toFixed(0), 'ft')}
        ${dataItem('ISA Temp (std)', env.isaTemp.toFixed(1), '°C')}
        ${dataItem('ISA Deviation', (env.isaDev > 0 ? '+' : '') + env.isaDev.toFixed(1), '°C')}
        ${dataItem('Performance Factor', env.daPerfPct.toFixed(1), '%')}
        ${dataItem('Air Density', env.airDensity.toFixed(3), 'kg/m³')}
        ${dataItem('Air Density', env.airDensityPct.toFixed(1), '% of SL')}
      </div>
      <p class="health-desc" style="margin-top:12px">Density altitude affects motor thrust and battery efficiency. At ${env.densityAltFt.toFixed(0)} ft DA, your motors produce ~${env.daPerfPct.toFixed(0)}% of sea-level thrust. ${env.densityAltFt > 3000 ? 'Plan for reduced endurance and climb rate.' : 'Conditions are favorable for flight.'}</p>
    </div>`;
  }

  // Field Elevation & Location
  if (env.fieldElevM !== undefined) {
    html += `<div class="card"><h3>Field Elevation & Location</h3><div class="data-grid">
      ${dataItem('Field Elevation (GPS)', env.fieldElevM.toFixed(0), 'm AMSL')}
      ${dataItem('Field Elevation', env.fieldElevFt.toFixed(0), 'ft AMSL')}
      ${dataItem('Max GPS Altitude', env.gpsAltMax.toFixed(0), 'm AMSL')}
      ${dataItem('Max AGL (baro)', env.baroAltMax.toFixed(0), 'm')}
      ${env.configFieldElev ? dataItem('Configured Elev (param)', env.configFieldElev.toFixed(0), 'm') : ''}
    </div></div>`;
  }

  // Temperature
  html += `<div class="card"><h3>Temperature</h3><div class="data-grid">`;
  if (env.baroTempAvg !== undefined) {
    html += dataItem('Baro Sensor Temp (avg)', env.baroTempAvg.toFixed(1), '°C');
    html += dataItem('Baro Sensor Temp', ((env.baroTempAvg * 9/5) + 32).toFixed(1), '°F');
    html += dataItem('Sensor Temp Range', env.baroTempMin.toFixed(1) + ' – ' + env.baroTempMax.toFixed(1), '°C');
  }
  if (env.gndTemp !== null && env.gndTemp !== undefined) {
    html += dataItem('Ground Temp (baro cal)', env.gndTemp.toFixed(1), '°C');
  }
  if (env.imuTempAvg !== undefined) {
    html += dataItem('IMU Temp (avg)', env.imuTempAvg.toFixed(1), '°C');
    html += dataItem('IMU Temp Range', `${env.imuTempMin.toFixed(1)} – ${env.imuTempMax.toFixed(1)}`, '°C');
  }
  if (env.heaterTarget !== undefined) {
    html += dataItem('IMU Heater Target', env.heaterTarget.toFixed(0), '°C');
    html += dataItem('Heater Output (avg)', env.heaterAvgOutput.toFixed(0), '%');
  }
  html += `</div></div>`;

  // Pressure
  if (env.baroPressAvg !== undefined) {
    const pressHpa = env.baroPressAvg / 100;
    const pressInHg = pressHpa * 0.02953;
    const gndPressHpa = env.gndPress / 100;
    html += `<div class="card"><h3>Barometric Pressure</h3><div class="data-grid">
      ${dataItem('Avg Pressure', pressHpa.toFixed(1), 'hPa')}
      ${dataItem('Avg Pressure', pressInHg.toFixed(2), 'inHg')}
      ${dataItem('Min Pressure (max alt)', (env.baroPressMin/100).toFixed(1), 'hPa')}
      ${dataItem('Ground Pressure', gndPressHpa.toFixed(1), 'hPa')}
      ${dataItem('Pressure Range', ((env.baroPressMax - env.baroPressMin)/100).toFixed(1), 'hPa')}
    </div>
    <p class="health-desc" style="margin-top:12px">Standard sea-level pressure is 1013.25 hPa / 29.92 inHg. Current conditions: ${pressHpa > 1013 ? 'high pressure (good weather)' : pressHpa > 1000 ? 'near standard' : 'low pressure (possible weather system)'}.</p>
    </div>`;
  }

  if (!html) {
    html = '<div class="card"><p class="health-desc">No environmental data available in this log.</p></div>';
  }

  el.innerHTML = html;
}

function renderCharts(data, phases, vehicleType) {
  const el = document.getElementById('tab-charts');
  const verdict = buildChartVerdict(data, phases);

  // Verdict badge
  const verdictColors = { good: 'badge-good', warn: 'badge-warn', bad: 'badge-bad' };
  const verdictLabels = { good: 'ALL SYSTEMS NORMAL', warn: 'CAUTION — REVIEW FLAGGED ITEMS', bad: 'WARNING — PROBLEMS DETECTED' };
  const verdictBorder = { good: 'var(--green)', warn: 'var(--yellow)', bad: 'var(--red)' };

  let verdictHtml = `<div class="card" style="border-color:${verdictBorder[verdict.overallStatus]};margin-bottom:20px">
    <h3 style="display:flex;align-items:center;gap:10px"><span class="badge ${verdictColors[verdict.overallStatus]}">${verdictLabels[verdict.overallStatus]}</span> Chart Analysis Summary</h3>`;
  for (const f of verdict.findings) {
    const icon = f.status === 'good' ? '&#10003;' : f.status === 'warn' ? '&#9888;' : '&#10007;';
    const color = f.status === 'good' ? 'var(--green)' : f.status === 'warn' ? 'var(--yellow)' : 'var(--red)';
    verdictHtml += `<p class="health-desc" style="margin:6px 0;padding-left:20px"><span style="color:${color};font-weight:bold">${icon}</span> ${f.text}</p>`;
  }
  verdictHtml += `</div>`;

  el.innerHTML = verdictHtml + `
    <div class="chart-row">
      <div class="card">
        <h3>Battery Voltage & Current</h3>
        <p class="health-desc" style="margin-bottom:8px">Blue = battery voltage (should decline steadily, not drop sharply). Orange = current draw in amps (spikes = high-power maneuvers). A sudden voltage drop under load means the battery is sagging — if it drops below low-voltage threshold, the aircraft will trigger a failsafe.</p>
        <div class="chart-container"><canvas id="chart-battery"></canvas></div>
      </div>
      <div class="card">
        <h3>Altitude & Climb Rate</h3>
        <p class="health-desc" style="margin-bottom:8px">Green = altitude above takeoff point in meters. Red = climb rate (positive = climbing, negative = descending). Flat sections = level flight or hover. Look for unexpected altitude changes that weren't commanded.</p>
        <div class="chart-container"><canvas id="chart-alt"></canvas></div>
      </div>
    </div>
    <div class="chart-row">
      <div class="card">
        <h3>Vibration Levels</h3>
        <p class="health-desc" style="margin-bottom:8px">X/Y/Z axis vibration in m/s&sup2;. Healthy = under 30. Warning = 30-60. Bad = over 60. High vibration causes GPS and barometer errors. Common causes: unbalanced props, loose motor mounts, damaged frame. If vibration increases over time, something is loosening.</p>
        <div class="chart-container"><canvas id="chart-vibe"></canvas></div>
      </div>
      <div class="card">
        <h3>Motor RPM</h3>
        <p class="health-desc" style="margin-bottom:8px">Per-motor RPM from ESC telemetry (if available). All motors should track closely together. If one motor runs consistently faster, it's compensating for a problem — bad prop, damaged motor, or CG offset. Large sudden divergence = motor or prop failure.</p>
        <div class="chart-container"><canvas id="chart-rpm"></canvas></div>
      </div>
    </div>
    <div class="chart-row">
      <div class="card">
        <h3>Throttle & Speed</h3>
        <p class="health-desc" style="margin-bottom:8px">Blue = throttle output (0-100%). Green = ground speed in m/s. In hover, speed should be near zero with steady throttle. In cruise, speed increases with throttle. If throttle is high but speed is low, the aircraft is fighting wind or has a drag problem.</p>
        <div class="chart-container"><canvas id="chart-throttle"></canvas></div>
      </div>
      <div class="card">
        <h3>Attitude (Roll/Pitch)</h3>
        <p class="health-desc" style="margin-bottom:8px">Roll = left/right tilt. Pitch = forward/back tilt. In degrees from level. During hover, both should stay near zero. During cruise, pitch tilts forward (negative). Sustained non-zero roll in hover = wind or CG offset. Erratic movement = turbulence or PID issues.</p>
        <div class="chart-container"><canvas id="chart-att"></canvas></div>
      </div>
    </div>
    <div class="chart-row">
      <div class="card">
        <h3>Desired vs Actual (Roll)</h3>
        <p class="health-desc" style="margin-bottom:8px">Dashed = what the flight controller WANTED. Solid = what the aircraft ACTUALLY did. They should track closely. A persistent gap means the PIDs can't keep up — the aircraft is sluggish or fighting a mechanical issue. Large gaps during maneuvers are normal (the aircraft takes time to respond).</p>
        <div class="chart-container"><canvas id="chart-desroll"></canvas></div>
      </div>
      <div class="card">
        <h3>Desired vs Actual (Pitch)</h3>
        <p class="health-desc" style="margin-bottom:8px">Same as roll but for pitch axis (forward/back). Watch for: oscillation (lines crossing rapidly = PIDs too aggressive), lag (actual trails desired = PIDs too low), or offset (actual consistently different from desired = trim or CG issue).</p>
        <div class="chart-container"><canvas id="chart-despitch"></canvas></div>
      </div>
    </div>
    <div class="chart-row">
      <div class="card">
        <h3>Flight Path (GPS Track)</h3>
        <p class="health-desc" style="margin-bottom:8px">Top-down view of the flight in meters from takeoff. Color shifts with altitude (brighter = higher). Green triangle = takeoff, red square = landing. A clean track means good GPS. Jagged or jumpy tracks indicate GPS issues. The path should match what was planned.</p>
        <div class="chart-container" style="height:400px"><canvas id="chart-path"></canvas></div>
      </div>
      <div class="card">
        <h3>Motor Outputs (PWM)</h3>
        <p class="health-desc" style="margin-bottom:8px">Raw PWM signal to each motor (1000=off, 2000=full power). All motors should follow similar patterns. If one motor consistently runs higher PWM than others, it's working harder to compensate for a problem (bad prop, CG offset, or motor issue). Sudden divergence = failure event.</p>
        <div class="chart-container"><canvas id="chart-motors"></canvas></div>
      </div>
    </div>
  `;

  // Load Chart.js dynamically
  if (typeof Chart === 'undefined') {
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js';
    script.onload = () => buildCharts(data);
    script.onerror = () => {
      el.innerHTML = '<div class="card"><p style="color:var(--text2)">Could not load Chart.js. Connect to the internet and reload, or charts will be unavailable.</p></div>';
    };
    document.head.appendChild(script);
  } else {
    buildCharts(data);
  }
}

function downsample(arr, maxPoints) {
  if (arr.length <= maxPoints) return arr;
  const step = arr.length / maxPoints;
  const result = [];
  for (let i = 0; i < maxPoints; i++) {
    result.push(arr[Math.floor(i * step)]);
  }
  return result;
}

function buildCharts(data) {
  const MAX_PTS = 2000;
  const chartOpts = (yLabel) => ({
    responsive: true,
    maintainAspectRatio: false,
    animation: false,
    plugins: { legend: { labels: { color: '#9499b3', font: { size: 11 } } } },
    scales: {
      x: { ticks: { color: '#9499b3', maxTicksLimit: 8 }, grid: { color: '#2e3348' } },
      y: { title: { display: true, text: yLabel, color: '#9499b3' }, ticks: { color: '#9499b3' }, grid: { color: '#2e3348' } },
    },
    elements: { point: { radius: 0 }, line: { borderWidth: 1.5 } },
  });

  // Battery
  const bat = downsample(data.BAT || [], MAX_PTS);
  if (bat.length > 0) {
    const t0 = bat[0].TimeUS;
    new Chart(document.getElementById('chart-battery'), {
      type: 'line',
      data: {
        labels: bat.map(b => ((b.TimeUS - t0)/1e6/60).toFixed(1)),
        datasets: [
          { label: 'Voltage (V)', data: bat.map(b => b.Volt), borderColor: '#5b8af5', yAxisID: 'y' },
          { label: 'Current (A)', data: bat.map(b => b.Curr), borderColor: '#e88a39', yAxisID: 'y1' },
        ]
      },
      options: {
        ...chartOpts('Voltage (V)'),
        scales: {
          ...chartOpts('').scales,
          x: { title: { display: true, text: 'Time (min)', color: '#9499b3' }, ticks: { color: '#9499b3', maxTicksLimit: 8 }, grid: { color: '#2e3348' } },
          y: { position: 'left', title: { display: true, text: 'Volts', color: '#9499b3' }, ticks: { color: '#9499b3' }, grid: { color: '#2e3348' } },
          y1: { position: 'right', title: { display: true, text: 'Amps', color: '#9499b3' }, ticks: { color: '#9499b3' }, grid: { display: false } },
        }
      }
    });
  }

  // Altitude & climb — use CTUN for copter, BARO for plane
  const ctun = downsample(data.CTUN || [], MAX_PTS);
  const isCopterChart = ctun.length > 0 && ('CRt' in (ctun[0]||{}));
  const altSource = isCopterChart ? ctun : downsample(data.BARO || [], MAX_PTS);
  if (altSource.length > 0) {
    const t0 = altSource[0].TimeUS;
    new Chart(document.getElementById('chart-alt'), {
      type: 'line',
      data: {
        labels: altSource.map(c => ((c.TimeUS - t0)/1e6/60).toFixed(1)),
        datasets: [
          { label: 'Altitude (m)', data: altSource.map(c => c.Alt), borderColor: '#4caf87', yAxisID: 'y' },
          { label: 'Climb Rate (m/s)', data: altSource.map(c => c.CRt), borderColor: '#e25555', yAxisID: 'y1' },
        ]
      },
      options: {
        ...chartOpts(''),
        scales: {
          x: { title: { display: true, text: 'Time (min)', color: '#9499b3' }, ticks: { color: '#9499b3', maxTicksLimit: 8 }, grid: { color: '#2e3348' } },
          y: { position: 'left', title: { display: true, text: 'Alt (m)', color: '#9499b3' }, ticks: { color: '#9499b3' }, grid: { color: '#2e3348' } },
          y1: { position: 'right', title: { display: true, text: 'm/s', color: '#9499b3' }, ticks: { color: '#9499b3' }, grid: { display: false } },
        }
      }
    });
  }

  // Vibration
  const vibe = downsample(data.VIBE || [], MAX_PTS);
  if (vibe.length > 0) {
    const t0 = vibe[0].TimeUS;
    new Chart(document.getElementById('chart-vibe'), {
      type: 'line',
      data: {
        labels: vibe.map(v => ((v.TimeUS - t0)/1e6/60).toFixed(1)),
        datasets: [
          { label: 'Vibe X', data: vibe.map(v => v.VibeX), borderColor: '#5b8af5' },
          { label: 'Vibe Y', data: vibe.map(v => v.VibeY), borderColor: '#4caf87' },
          { label: 'Vibe Z', data: vibe.map(v => v.VibeZ), borderColor: '#e88a39' },
        ]
      },
      options: chartOpts('Vibration (m/s²)')
    });
  }

  // Motor RPM
  const esc = data.ESC || [];
  if (esc.length > 0) {
    const motorGroups = {};
    for (const e of esc) {
      const inst = e.Instance !== undefined ? e.Instance : 0;
      if (!motorGroups[inst]) motorGroups[inst] = [];
      motorGroups[inst].push(e);
    }
    const colors = ['#5b8af5','#4caf87','#e88a39','#e25555','#9b59b6','#1abc9c','#f39c12','#e74c3c'];
    const datasets = [];
    let labels = [];
    for (const [inst, msgs] of Object.entries(motorGroups)) {
      const ds = downsample(msgs, MAX_PTS);
      if (labels.length === 0 && ds.length > 0) {
        const t0 = ds[0].TimeUS;
        labels = ds.map(m => ((m.TimeUS - t0)/1e6/60).toFixed(1));
      }
      datasets.push({
        label: `Motor ${inst}`,
        data: downsample(msgs, MAX_PTS).map(m => m.RPM),
        borderColor: colors[inst % colors.length],
      });
    }
    new Chart(document.getElementById('chart-rpm'), {
      type: 'line', data: { labels, datasets }, options: chartOpts('RPM')
    });
  }

  // Throttle & speed
  const gps = downsample(data.GPS || [], MAX_PTS);
  if (ctun.length > 0) {
    const t0 = ctun[0].TimeUS;
    const datasets = [
      { label: 'Throttle (%)', data: ctun.map(c => (c.ThO||0)*100), borderColor: '#5b8af5', yAxisID: 'y' },
    ];
    if (gps.length > 0) {
      datasets.push({ label: 'Speed (m/s)', data: downsample(gps, ctun.length).map(g => g.Spd), borderColor: '#4caf87', yAxisID: 'y1' });
    }
    new Chart(document.getElementById('chart-throttle'), {
      type: 'line',
      data: { labels: ctun.map(c => ((c.TimeUS - t0)/1e6/60).toFixed(1)), datasets },
      options: {
        ...chartOpts(''),
        scales: {
          x: { title: { display: true, text: 'Time (min)', color: '#9499b3' }, ticks: { color: '#9499b3', maxTicksLimit: 8 }, grid: { color: '#2e3348' } },
          y: { position: 'left', title: { display: true, text: 'Throttle %', color: '#9499b3' }, ticks: { color: '#9499b3' }, grid: { color: '#2e3348' } },
          y1: { position: 'right', title: { display: true, text: 'm/s', color: '#9499b3' }, ticks: { color: '#9499b3' }, grid: { display: false } },
        }
      }
    });
  }

  // Attitude
  const att = downsample(data.ATT || [], MAX_PTS);
  if (att.length > 0) {
    const t0 = att[0].TimeUS;
    new Chart(document.getElementById('chart-att'), {
      type: 'line',
      data: {
        labels: att.map(a => ((a.TimeUS - t0)/1e6/60).toFixed(1)),
        datasets: [
          { label: 'Roll (°)', data: att.map(a => a.Roll), borderColor: '#5b8af5' },
          { label: 'Pitch (°)', data: att.map(a => a.Pitch), borderColor: '#e88a39' },
        ]
      },
      options: chartOpts('Degrees')
    });

    // Desired vs Actual Roll
    new Chart(document.getElementById('chart-desroll'), {
      type: 'line',
      data: {
        labels: att.map(a => ((a.TimeUS - t0)/1e6/60).toFixed(1)),
        datasets: [
          { label: 'Desired Roll', data: att.map(a => a.DesRoll), borderColor: '#5b8af5', borderDash: [5,3] },
          { label: 'Actual Roll', data: att.map(a => a.Roll), borderColor: '#4caf87' },
        ]
      },
      options: chartOpts('Degrees')
    });

    // Desired vs Actual Pitch
    new Chart(document.getElementById('chart-despitch'), {
      type: 'line',
      data: {
        labels: att.map(a => ((a.TimeUS - t0)/1e6/60).toFixed(1)),
        datasets: [
          { label: 'Desired Pitch', data: att.map(a => a.DesPitch), borderColor: '#e88a39', borderDash: [5,3] },
          { label: 'Actual Pitch', data: att.map(a => a.Pitch), borderColor: '#e25555' },
        ]
      },
      options: chartOpts('Degrees')
    });
  }

  // Flight Path (2D GPS track)
  const gpsPath = downsample(data.GPS || [], MAX_PTS);
  if (gpsPath.length > 10) {
    // Convert to relative meters from first point
    const lat0 = gpsPath[0].Lat, lng0 = gpsPath[0].Lng;
    const points = gpsPath.map(g => ({
      x: (g.Lng - lng0) * 111139 * Math.cos(lat0 * Math.PI / 180),
      y: (g.Lat - lat0) * 111139,
      alt: g.Alt
    }));

    new Chart(document.getElementById('chart-path'), {
      type: 'scatter',
      data: {
        datasets: [{
          label: 'Flight Track',
          data: points,
          borderColor: '#5b8af5',
          backgroundColor: points.map(p => {
            const alt = p.alt || 0;
            const maxAlt = Math.max(...points.map(pp => pp.alt || 0), 1);
            const ratio = Math.min(1, alt / maxAlt);
            return `rgba(${Math.round(91 + ratio*134)}, ${Math.round(138 - ratio*53)}, ${Math.round(245 - ratio*160)}, 0.7)`;
          }),
          pointRadius: 2,
          showLine: true,
          borderWidth: 1.5,
          fill: false,
        },
        {
          label: 'Takeoff',
          data: [points[0]],
          backgroundColor: '#4caf87',
          pointRadius: 8,
          pointStyle: 'triangle',
        },
        {
          label: 'Landing',
          data: [points[points.length-1]],
          backgroundColor: '#e25555',
          pointRadius: 8,
          pointStyle: 'rect',
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        plugins: { legend: { labels: { color: '#9499b3', font: { size: 11 } } } },
        scales: {
          x: { title: { display: true, text: 'East-West (m)', color: '#9499b3' }, ticks: { color: '#9499b3' }, grid: { color: '#2e3348' } },
          y: { title: { display: true, text: 'North-South (m)', color: '#9499b3' }, ticks: { color: '#9499b3' }, grid: { color: '#2e3348' } },
        },
        elements: { point: { radius: 2 } },
      }
    });
  }

  // Motor Outputs (RCOU PWM)
  const rcou = downsample(data.RCOU || [], MAX_PTS);
  if (rcou.length > 0) {
    const t0 = rcou[0].TimeUS;
    const labels = rcou.map(r => ((r.TimeUS - t0)/1e6/60).toFixed(1));
    const colors = ['#5b8af5','#4caf87','#e88a39','#e25555','#9b59b6','#1abc9c','#f39c12','#e74c3c'];
    const datasets = [];
    for (let i = 1; i <= 8; i++) {
      const key = `C${i}`;
      if (rcou[0][key] !== undefined) {
        const vals = rcou.map(r => r[key]);
        if (vals.some(v => v > 1050)) {
          datasets.push({ label: `Motor ${i}`, data: vals, borderColor: colors[i-1] });
        }
      }
    }
    if (datasets.length > 0) {
      new Chart(document.getElementById('chart-motors'), {
        type: 'line', data: { labels, datasets }, options: chartOpts('PWM (µs)')
      });
    }
  }
}

let _analysisResult = null; // Store for export

function exportTXT() {
  if (!_analysisResult) return;
  const { mission, health, report, tuning, alerts, fileName } = _analysisResult;
  let txt = '';
  txt += `FLIGHT ANALYZER REPORT\n`;
  txt += `======================\n`;
  txt += `File: ${fileName}\n`;
  txt += `Generated: ${new Date().toISOString()}\n\n`;

  // Section 1
  txt += `\n${'='.repeat(50)}\n`;
  txt += `SECTION 1: MISSION PLANNING DATA\n`;
  txt += `${'='.repeat(50)}\n\n`;
  const vt = mission.vehicleType;
  const phaseList = vt === 'plane' ?
    [['LOITER (CIRCLING)', mission.loiter], ['CRUISE', mission.cruise], ['CLIMB', mission.climb], ['DESCENT', mission.descent], ['GLIDE (THROTTLE IDLE)', mission.glide]] :
    vt === 'quadplane' ?
    [['HOVER (VTOL)', mission.hover], ['LOITER (CIRCLING)', mission.loiter], ['CRUISE', mission.cruise], ['CLIMB', mission.climb], ['DESCENT', mission.descent], ['GLIDE', mission.glide]] :
    [['HOVER', mission.hover], ['CRUISE', mission.cruise], ['CLIMB', mission.climb], ['DESCENT', mission.descent]];
  for (const [name, data] of phaseList) {
    txt += `--- ${name} ---\n`;
    txt += `  Amps/Hour:   ${data.ampsPerHour.toFixed(2)} A/hr\n`;
    txt += `  Amps/Min:    ${data.ampsPerMin.toFixed(3)} A/min\n`;
    txt += `  Watts/Hour:  ${data.wattsPerHour.toFixed(1)} W/hr\n`;
    txt += `  Watts/Min:   ${data.wattsPerMin.toFixed(2)} W/min\n`;
    txt += `  mAh/Hour:    ${data.mahPerHour.toFixed(0)} mAh/hr\n`;
    txt += `  mAh/Min:     ${data.mahPerMin.toFixed(1)} mAh/min\n`;
    txt += `  Avg Voltage: ${data.voltageAvg.toFixed(2)} V\n`;
    txt += `  Samples:     ${data.samples}\n\n`;
  }
  txt += `--- CAPACITY & ENDURANCE ---\n`;
  txt += `  Used:             ${mission.usedMah.toFixed(0)} mAh / ${mission.usedWh.toFixed(1)} Wh\n`;
  txt += `  Voltage:          ${mission.startVolt.toFixed(2)}V -> ${mission.endVolt.toFixed(2)}V\n`;
  const primaryEndLabel = vt === 'plane' ? 'Loiter Endurance' : 'Hover Endurance';
  txt += `  ${primaryEndLabel}:  ${mission.primaryEndurance.toFixed(1)} min\n`;
  txt += `  Cruise Endurance: ${mission.cruiseEndurance.toFixed(1)} min\n`;
  txt += `  Cruise Range:     ${mission.cruiseRange.toFixed(2)} km\n`;
  txt += `  Avg Climb Rate:   ${mission.avgClimbRate.toFixed(2)} m/s\n`;
  txt += `  Avg Descent Rate: ${mission.avgDescentRate.toFixed(2)} m/s\n`;
  txt += `  Avg Cruise Speed: ${mission.avgCruiseSpeed.toFixed(1)} m/s (${mission.avgCruiseSpeedKmh.toFixed(1)} km/h)\n\n`;

  // Section 2
  txt += `\n${'='.repeat(50)}\n`;
  txt += `SECTION 2: TROUBLESHOOTING / HEALTH\n`;
  txt += `${'='.repeat(50)}\n\n`;
  for (const h of health) {
    txt += `[${h.status.toUpperCase()}] ${h.title}\n`;
    txt += `  ${h.desc}\n\n`;
  }

  // Section 3
  txt += `\n${'='.repeat(50)}\n`;
  txt += `SECTION 3: FULL FLIGHT REPORT\n`;
  txt += `${'='.repeat(50)}\n\n`;
  txt += `Duration:       ${report.durationMin?.toFixed(1) || '?'} min (${report.durationSec?.toFixed(0) || '?'} sec)\n`;
  txt += `Max Altitude:   ${report.maxAlt?.toFixed(1) || '?'} m\n`;
  txt += `Max Speed:      ${report.maxSpeed?.toFixed(1) || '?'} m/s (${report.maxSpeedKmh?.toFixed(1) || '?'} km/h)\n`;
  txt += `Total Distance: ${report.totalDistKm?.toFixed(2) || '?'} km\n`;
  txt += `Battery:        ${report.startVolt?.toFixed(2) || '?'}V -> ${report.endVolt?.toFixed(2) || '?'}V\n`;
  txt += `Consumed:       ${report.totalMah?.toFixed(0) || '?'} mAh / ${report.totalWh?.toFixed(1) || '?'} Wh\n`;
  txt += `Max Current:    ${report.maxCurrent?.toFixed(1) || '?'} A\n`;
  txt += `Max Climb:      ${report.maxClimbRate?.toFixed(1) || '?'} m/s\n`;
  txt += `Max Descent:    ${report.maxDescentRate?.toFixed(1) || '?'} m/s\n\n`;

  if (report.motors) {
    txt += `Motor Summary:\n`;
    txt += `  ${'Motor'.padEnd(8)}${'Avg RPM'.padEnd(10)}${'Max RPM'.padEnd(10)}${'Avg A'.padEnd(10)}${'Max A'.padEnd(10)}${'ESC °C'.padEnd(10)}${'Mot °C'.padEnd(10)}\n`;
    for (const m of report.motors) {
      txt += `  ${String(m.id).padEnd(8)}${m.avgRPM.toFixed(0).padEnd(10)}${m.maxRPM.toFixed(0).padEnd(10)}${m.avgCurr.toFixed(2).padEnd(10)}${m.maxCurr.toFixed(2).padEnd(10)}${m.maxTemp.toFixed(0).padEnd(10)}${m.maxMotorTemp.toFixed(0).padEnd(10)}\n`;
    }
    txt += '\n';
  }

  if (report.vibeAvgX !== undefined) {
    txt += `Vibration: X=${report.vibeAvgX.toFixed(1)} Y=${report.vibeAvgY.toFixed(1)} Z=${report.vibeAvgZ.toFixed(1)} m/s²  Clips: ${report.totalClips}\n\n`;
  }

  // Section 4
  txt += `\n${'='.repeat(50)}\n`;
  txt += `SECTION 4: TUNING RECOMMENDATIONS\n`;
  txt += `${'='.repeat(50)}\n\n`;
  for (const t of tuning) {
    txt += `${t.title}: ${t.value}\n`;
    txt += `  ${t.reason}\n\n`;
  }

  // Section 5: Alerts & Events
  if (alerts) {
    txt += `\n${'='.repeat(50)}\n`;
    txt += `SECTION 5: ALERTS, ERRORS & EVENTS\n`;
    txt += `${'='.repeat(50)}\n\n`;

    if (alerts.brownoutCheck) {
      txt += `[CRITICAL] ${alerts.brownoutCheck.title}\n  ${alerts.brownoutCheck.desc}\n\n`;
    }
    if (alerts.errors.length > 0) {
      txt += `--- ERRORS / FAILSAFES ---\n`;
      for (const e of alerts.errors) {
        txt += `  [${e.status.toUpperCase()}] ${e.desc} (at ${(e.timeUS/1e6/60).toFixed(1)} min)\n`;
      }
      txt += '\n';
    } else {
      txt += `No errors or failsafes recorded.\n\n`;
    }
    if (alerts.ekfHealth) txt += `[${alerts.ekfHealth.status.toUpperCase()}] ${alerts.ekfHealth.title}: ${alerts.ekfHealth.desc}\n\n`;
    if (alerts.compassCheck) txt += `[${alerts.compassCheck.status.toUpperCase()}] ${alerts.compassCheck.title}: ${alerts.compassCheck.desc}\n\n`;
    if (alerts.powerCheck) txt += `[${alerts.powerCheck.status.toUpperCase()}] ${alerts.powerCheck.title}: ${alerts.powerCheck.desc}\n\n`;
    if (alerts.sensorCheck) txt += `[${alerts.sensorCheck.status.toUpperCase()}] ${alerts.sensorCheck.title}: ${alerts.sensorCheck.desc}\n\n`;

    txt += `--- EVENT TIMELINE ---\n`;
    for (const e of alerts.events) {
      txt += `  ${(e.timeUS/1e6/60).toFixed(2)} min: ${e.name}\n`;
    }
    txt += '\n';

    txt += `--- FC MESSAGES ---\n`;
    for (const m of alerts.fcMessages) {
      txt += `  ${(m.timeUS/1e6/60).toFixed(2)} min: ${m.text}\n`;
    }
    txt += '\n';
  }

  // Download
  const blob = new Blob([txt], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = _analysisResult.fileName.replace(/\.(bin|BIN)$/, '') + '_report.txt';
  a.click();
  URL.revokeObjectURL(url);
}


// ============================================================
// APP CONTROLLER
// ============================================================

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const progressWrap = document.getElementById('progress-wrap');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progress-text');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });

// Tab switching
document.getElementById('tabBar').addEventListener('click', e => {
  if (!e.target.classList.contains('tab')) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('tab-' + e.target.dataset.tab).classList.add('active');
});

function handleFile(file) {
  if (!file.name.toLowerCase().endsWith('.bin')) {
    alert('Please select an ArduPilot .BIN log file.');
    return;
  }

  progressWrap.style.display = 'block';
  dropZone.style.display = 'none';
  progressText.textContent = `Reading ${file.name} (${(file.size/1024/1024).toFixed(1)} MB)...`;
  progressFill.style.width = '0%';

  const reader = new FileReader();
  reader.onprogress = (e) => {
    if (e.lengthComputable) {
      const pct = (e.loaded / e.total * 50)|0;
      progressFill.style.width = pct + '%';
      progressText.textContent = `Reading file... ${pct * 2}%`;
    }
  };
  reader.onload = () => {
    progressText.textContent = 'Parsing log...';
    progressFill.style.width = '50%';
    // Use setTimeout to let UI update before heavy parsing
    setTimeout(() => {
      try {
        const result = parseLog(reader.result, (pct, count) => {
          progressFill.style.width = (50 + pct/2) + '%';
          progressText.textContent = `Parsing... ${pct}% (${count.toLocaleString()} messages)`;
        });
        runAnalysis(result, file.name);
      } catch(e) {
        progressText.textContent = 'Error: ' + e.message;
        console.error(e);
      }
    }, 50);
  };
  reader.onerror = () => {
    progressText.textContent = 'Error reading file.';
  };
  reader.readAsArrayBuffer(file);
}

function runAnalysis(parsed, fileName) {
  progressText.textContent = 'Analyzing flight data...';
  progressFill.style.width = '95%';

  setTimeout(() => {
    const phases = detectPhases(parsed.data);
    const mission = calcMissionPlanning(parsed.data, phases);
    const health = calcTroubleshooting(parsed.data);
    const report = calcFlightReport(parsed.data, phases, mission);
    const tuning = calcTuning(parsed.data, phases, mission, parsed.params);
    const alerts = calcAlerts(parsed.data, parsed.params);
    const paramSummary = calcParamSummary(parsed.params, mission.vehicleType);

    _analysisResult = { mission, health, report, tuning, alerts, paramSummary, fileName, parsed };

    // Render
    renderFlightInfo(parsed, fileName, report, mission.vehicleType);
    renderMissionPlanning(mission);
    renderHealth(health, alerts);
    renderFlightReport(report, alerts, paramSummary, mission.vehicleType);
    renderTuning(tuning);
    const environment = calcEnvironment(parsed.data, parsed.params);
    renderEnvironment(environment);
    renderCharts(parsed.data, phases, mission.vehicleType);

    // Show report
    document.getElementById('landing').style.display = 'none';
    document.getElementById('report').style.display = 'block';
    document.getElementById('btn-new').style.display = '';
    document.getElementById('btn-export').style.display = '';
    progressFill.style.width = '100%';
  }, 50);
}

function renderFlightInfo(parsed, fileName, report, vehicleType) {
  const el = document.getElementById('flightInfo');
  const typeCounts = {};
  for (const [name, msgs] of Object.entries(parsed.data)) {
    typeCounts[name] = msgs.length;
  }
  const vtLabel = { copter: 'Copter', plane: 'Plane', quadplane: 'QuadPlane (VTOL)', unknown: 'Unknown' }[vehicleType] || vehicleType;
  el.innerHTML = `
    <span><strong>File:</strong> ${fileName}</span>
    <span><strong>Vehicle:</strong> ${vtLabel}</span>
    <span><strong>Size:</strong> ${(parsed.fileSize/1024/1024).toFixed(1)} MB</span>
    <span><strong>Messages:</strong> ${parsed.msgCount.toLocaleString()}</span>
    <span><strong>Duration:</strong> ${report.durationMin?.toFixed(1) || '?'} min</span>
    <span><strong>Types:</strong> ${Object.keys(typeCounts).length}</span>
  `;
}

function resetApp() {
  _analysisResult = null;
  document.getElementById('landing').style.display = '';
  document.getElementById('report').style.display = 'none';
  document.getElementById('btn-new').style.display = 'none';
  document.getElementById('btn-export').style.display = 'none';
  dropZone.style.display = '';
  progressWrap.style.display = 'none';
  fileInput.value = '';
  // Reset tabs
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===0));
  document.querySelectorAll('.tab-content').forEach((t,i) => t.classList.toggle('active', i===0));
}
</script>
